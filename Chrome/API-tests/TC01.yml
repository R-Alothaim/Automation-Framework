name: TC01 API Test - DevOps
description: Contact Form API Test for CI/CD Pipeline

browser: chrome
headless: true
timeout: 30

environment:
  baseUrl: ${BASE_URL}
  apiEndpoint: ${API_ENDPOINT}
  
test:
  suite: API-tests
  class: tests.APITests.TC01_ContactFormAPI_Test
  type: api
  
reporting:
  allure: true
  jsonReport: true
  
execution:
  parallel: false
  threadCount: 1
  retryCount: 1
