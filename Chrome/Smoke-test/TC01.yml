name: TC01 Smoke Test - DevOps
description: Contact Form Validation Test for CI/CD Pipeline

browser: chrome
headless: true
timeout: 30

environment:
  baseUrl: ${BASE_URL}
  browser: chrome
  browserVersion: latest
  
